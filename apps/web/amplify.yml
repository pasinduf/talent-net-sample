version: 1
applications:
  - appRoot: apps/web
    frontend:
      phases:
        preBuild:
          commands:
            - cd ../..
            - npm ci
            - npm run build --filter=@talent-net/types
        build:
          commands:
            - cd apps/web
            - npx next build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - ../../node_modules/**/*
          - .next/cache/**/*
      environment:
        variables:
          NEXT_PUBLIC_API_BASE_URL: https://api.talent-net.example.com
          NEXT_PUBLIC_APP_URL: https://talent-net.example.com
